<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FlowSync Pro - Plataforma SaaS para gestão ágil de projetos com narração neural de IA. Automação inteligente, colaboração em tempo real.">
    <meta name="keywords" content="gestão de projetos, SaaS, agile, automação, IA, narração de voz">
    <meta property="og:title" content="FlowSync Pro | Gestão Ágil de Projetos">
    <meta property="og:description" content="Transforme seu workflow com FlowSync Pro">
    <meta property="og:image" content="https://via.placeholder.com/1200x630?text=FlowSync+Pro">
    <link rel="canonical" href="https://flowsync-pro.vercel.app">
    
    <title>FlowSync Pro | Gestão Ágil de Projetos com IA</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FlowSync Pro",
      "url": "https://flowsync-pro.vercel.app",
      "description": "Plataforma SaaS para gestão ágil de projetos",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "contato@flowsyncp.com"
      }
    }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            line-height: 1.6;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, #1a1f3a 0%, #16213e 100%);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #00d4ff;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.1);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        nav ul {
            display: flex;
            gap: 1.5rem;
            list-style: none;
            flex-wrap: wrap;
        }

        nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        nav a:hover {
            color: #00d4ff;
        }

        .mobile-menu {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .mobile-menu span {
            width: 25px;
            height: 3px;
            background: #00d4ff;
            margin: 5px 0;
            transition: 0.3s;
        }

        /* HERO */
        .hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 6rem 2rem;
            text-align: center;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: #b0b0b0;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #0a0e27;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.3);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #00d4ff;
            color: #00d4ff;
        }

        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        /* ÁUDIO */
        .audio-section {
            background: rgba(0, 212, 255, 0.05);
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid #00d4ff;
            margin: 2rem 0;
            text-align: center;
        }

        .audio-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #0a0e27;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .audio-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        /* SEÇÕES */
        section {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 3rem 2rem;
        }

        section h2 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #00d4ff;
            text-align: center;
        }

        /* GRID DE CARDS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .card {
            background: linear-gradient(135deg, #1a1f3a 0%, #16213e 100%);
            padding: 2rem;
            border-radius: 10px;
            border: 1px solid #00d4ff;
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
            transform: translateY(-5px);
            border-color: #00ff00;
        }

        .card h3 {
            color: #00d4ff;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .card p {
            color: #a0a0a0;
            line-height: 1.7;
        }

        /* PRICING */
        .pricing-card {
            background: linear-gradient(135deg, #1a1f3a 0%, #16213e 100%);
            padding: 2rem;
            border-radius: 10px;
            border: 2px solid transparent;
            text-align: center;
            transition: all 0.3s ease;
        }

        .pricing-card:hover {
            border-color: #00d4ff;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
            transform: translateY(-5px);
        }

        .pricing-card.featured {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .pricing-card h3 {
            color: #00d4ff;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .price {
            font-size: 2.5rem;
            color: #00d4ff;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .price-period {
            color: #a0a0a0;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .features {
            text-align: left;
            margin-bottom: 2rem;
            list-style: none;
        }

        .features li {
            margin-bottom: 0.8rem;
            color: #c0c0c0;
            padding-left: 25px;
            position: relative;
        }

        .features li::before {
            content: '✓';
            color: #00ff00;
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        /* FAQ */
        .faq-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .faq-item {
            background: linear-gradient(135deg, #1a1f3a 0%, #16213e 100%);
            border-left: 4px solid #00d4ff;
            margin-bottom: 1rem;
            border-radius: 5px;
            overflow: hidden;
        }

        .faq-question {
            padding: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: all 0.3s ease;
        }

        .faq-question:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        .faq-question h4 {
            color: #00d4ff;
            margin: 0;
            font-size: 1rem;
            flex: 1;
        }

        .faq-toggle {
            color: #00d4ff;
            font-size: 1.5rem;
            transition: transform 0.3s ease;
            margin-left: 1rem;
        }

        .faq-toggle.active {
            transform: rotate(180deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            padding: 0 1.5rem;
            transition: all 0.3s ease;
        }

        .faq-answer.active {
            max-height: 500px;
            padding: 0 1.5rem 1.5rem 1.5rem;
        }

        .faq-answer p {
            color: #c0c0c0;
            line-height: 1.7;
        }

        /* FORM */
        .contact-form {
            max-width: 600px;
            margin: 2rem auto;
            background: linear-gradient(135deg, #1a1f3a 0%, #16213e 100%);
            padding: 2rem;
            border-radius: 10px;
            border: 1px solid #00d4ff;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #00d4ff;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid #00d4ff;
            border-radius: 5px;
            color: #e0e0e0;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* FOOTER */
        footer {
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
            border-top: 2px solid #00d4ff;
            padding: 3rem 2rem;
            margin-top: 4rem;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .footer-section h4 {
            color: #00d4ff;
            margin-bottom: 1rem;
        }

        .footer-section a {
            color: #a0a0a0;
            text-decoration: none;
            display: block;
            margin-bottom: 0.5rem;
            transition: color 0.3s ease;
            font-size: 0.9rem;
        }

        .footer-section a:hover {
            color: #00d4ff;
        }

        .footer-section p {
            color: #a0a0a0;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .footer-bottom {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #00d4ff;
            color: #808080;
            font-size: 0.85rem;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: #1a1f3a;
                padding: 2rem;
                gap: 1rem;
                z-index: 999;
            }

            nav ul.active {
                display: flex;
            }

            .mobile-menu {
                display: flex;
            }

            .hero h1 {
                font-size: 1.8rem;
            }

            .hero {
                padding: 3rem 1rem;
            }

            section {
                margin: 2rem auto;
                padding: 2rem 1rem;
            }

            section h2 {
                font-size: 1.5rem;
            }

            nav {
                padding: 0 1rem;
            }

            .logo {
                font-size: 1.2rem;
            }

            .cta-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <nav>
            <div class="logo">FlowSync Pro</div>
            <ul id="navMenu">
                <li><a href="#home">Início</a></li>
                <li><a href="#about">Sobre</a></li>
                <li><a href="#features">Recursos</a></li>
                <li><a href="#pricing">Preços</a></li>
                <li><a href="#faq">FAQ</a></li>
                <li><a href="#contact">Contato</a></li>
            </ul>
            <div class="mobile-menu" id="mobileMenu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <!-- HERO -->
    <section id="home" class="hero">
        <h1>Sincronize Seus Projetos com FlowSync Pro</h1>
        <p>Plataforma SaaS completa para gestão ágil com automação inteligente e narração neural de IA</p>
        
        <!-- ÁUDIO ELEVENLABS -->
        <div class="audio-section">
            <button class="audio-button" onclick="playHeroAudio()">
                🔊 Ouça a Apresentação
            </button>
        </div>

        <div class="cta-buttons">
            <button class="btn btn-primary" onclick="scrollToSection('#pricing')">Começar Grátis</button>
            <button class="btn btn-secondary" onclick="scrollToSection('#contact')">Solicitar Demo</button>
        </div>
    </section>

    <!-- SOBRE -->
    <section id="about">
